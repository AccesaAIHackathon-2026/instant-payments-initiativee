services:

  fips-simulator:
    build:
      context: ./fips-simulator
    ports:
      - "8081:8081"
    environment:
      - FIPS_BANKS_0_PREFIX=DE89370400440532013
      - FIPS_BANKS_0_URL=http://bank-a:8080
      - FIPS_BANKS_1_PREFIX=DE89370400440532014
      - FIPS_BANKS_1_URL=http://bank-b:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bank-a:
    build:
      context: ./bank-simulator
    ports:
      - "8080:8080"
    environment:
      - BANK_ID=bank-a
      - BANK_IBAN_PREFIX=DE89370400440532013
      - FIPS_BASE_URL=http://fips-simulator:8081
      - BANK_API_KEY=${BANK_API_KEY:-blinkpay-poc-key}
    depends_on:
      fips-simulator:
        condition: service_healthy

  bank-b:
    build:
      context: ./bank-simulator
    ports:
      - "8082:8080"
    environment:
      - BANK_ID=bank-b
      - BANK_IBAN_PREFIX=DE89370400440532014
      - FIPS_BASE_URL=http://fips-simulator:8081
      - BANK_API_KEY=${BANK_API_KEY:-blinkpay-poc-key}
    depends_on:
      fips-simulator:
        condition: service_healthy

  retail-web-app:
    build:
      context: ./retail-web-app
      args:
        - BANK_API_KEY=${BANK_API_KEY:-blinkpay-poc-key}
        - BANK_A_BASE_URL=${BANK_API_BASE_URL:-http://localhost:8080}
        - BANK_B_BASE_URL=${BANK_B_API_BASE_URL:-http://localhost:8082}
    ports:
      - "3001:80"
    depends_on:
      - bank-a
      - bank-b

  flow-visualizer:
    build:
      context: ./flow-visualizer
    ports:
      - "3002:80"
    depends_on:
      - bank-a
      - bank-b
      - fips-simulator

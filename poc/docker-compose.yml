services:

  fips-simulator:
    build:
      context: ./fips-simulator
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bank-simulator:
    build:
      context: ./bank-simulator
    ports:
      - "8080:8080"
    environment:
      - FIPS_BASE_URL=http://fips-simulator:8081
      - BANK_API_KEY=${BANK_API_KEY:-blinkpay-poc-key}
    depends_on:
      fips-simulator:
        condition: service_healthy

  retail-web-app:
    build:
      context: ./retail-web-app
      args:
        - BANK_API_KEY=${BANK_API_KEY:-blinkpay-poc-key}
    ports:
      - "3001:80"
    depends_on:
      - bank-simulator

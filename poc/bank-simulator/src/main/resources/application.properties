server.port=8080
spring.application.name=bank-simulator

# FIPS simulator base URL — override if running on a different host
fips.base-url=http://localhost:8081

# API key required on every /bank/** request (X-Api-Key header or ?apiKey= query param)
# Override via BANK_API_KEY environment variable in production
bank.api-key=${BANK_API_KEY:blinkpay-poc-key}

server.port=8080
server.address=127.0.0.1
spring.application.name=bank-simulator

# FIPS simulator base URL — override if running on a different host
fips.base-url=http://localhost:8081

# API key required on every /bank/** request (X-Api-Key header or ?apiKey= query param)
# Override via BANK_API_KEY environment variable in production
bank.api-key=${BANK_API_KEY:blinkpay-poc-key}

# Bank identity — used to determine intra-bank vs inter-bank routing.
# bank.id drives account seeding (bank-a = Alice/Bob/Retail, bank-b = Charlie/Metro).
# bank.iban-prefix is the shared prefix of all IBANs owned by this bank.
bank.id=${BANK_ID:bank-a}
bank.iban-prefix=${BANK_IBAN_PREFIX:DE89370400440532013}

# Commission charged to the creditor (merchant) on inter-bank settlements.
# Intra-bank payments are always free. Pricing parity with standard SCT per EU 2024/886.
bank.inter-bank-commission=0.20

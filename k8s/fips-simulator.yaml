apiVersion: apps/v1
kind: Deployment
metadata:
  name: fips-simulator
  namespace: instant-payments
  labels:
    app: fips-simulator
    team: instant-payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fips-simulator
  template:
    metadata:
      labels:
        app: fips-simulator
        team: instant-payments
    spec:
      containers:
        - name: fips-simulator
          image: acrmanagementprod.azurecr.io/instant-payments/fips-simulator:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fips-simulator
  namespace: instant-payments
  labels:
    app: fips-simulator
    team: instant-payments
spec:
  type: ClusterIP
  selector:
    app: fips-simulator
  ports:
    - name: http
      port: 8081
      targetPort: 8081

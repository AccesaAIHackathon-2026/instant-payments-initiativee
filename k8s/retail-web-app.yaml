apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-web-app
  namespace: instant-payments
  labels:
    app: retail-web-app
    team: instant-payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-web-app
  template:
    metadata:
      labels:
        app: retail-web-app
        team: instant-payments
    spec:
      containers:
        - name: retail-web-app
          image: acrmanagementprod.azurecr.io/instant-payments/retail-web-app:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: retail-web-app
  namespace: instant-payments
  labels:
    app: retail-web-app
    team: instant-payments
spec:
  type: ClusterIP
  selector:
    app: retail-web-app
  ports:
    - name: http
      port: 80
      targetPort: 80

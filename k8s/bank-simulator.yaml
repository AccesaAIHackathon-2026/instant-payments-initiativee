apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-simulator
  namespace: instant-payments
  labels:
    app: bank-simulator
    team: instant-payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-simulator
  template:
    metadata:
      labels:
        app: bank-simulator
        team: instant-payments
    spec:
      containers:
        - name: bank-simulator
          image: acrmanagementprod.azurecr.io/instant-payments/bank-simulator:latest
          ports:
            - containerPort: 8080
          env:
            - name: FIPS_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: instant-payments-config
                  key: FIPS_BASE_URL
            - name: BANK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: instant-payments-secrets
                  key: BANK_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bank-simulator
  namespace: instant-payments
  labels:
    app: bank-simulator
    team: instant-payments
spec:
  type: ClusterIP
  selector:
    app: bank-simulator
  ports:
    - name: http
      port: 80
      targetPort: 8080
